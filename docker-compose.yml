services:
  db:
    image: postgres:16-alpine
    container_name: ezmoney-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ezmoney
      POSTGRES_PASSWORD: ezmoney
      POSTGRES_DB: ezmoney
    ports:
      - "5433:5432"   # host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432)
    volumes:
      - ezmoney-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezmoney"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ezmoney-pgdata:
