name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            desktop/renderer/package-lock.json

      # Electron's binary isn't needed for unit tests or the type/Angular builds,
      # so skip its (large) download to keep CI fast.
      - name: Install desktop deps
        working-directory: desktop
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Install renderer deps
        working-directory: desktop/renderer
        run: npm ci

      - name: Unit tests (Vitest)
        working-directory: desktop
        run: npm test

      - name: Build renderer (Angular)
        working-directory: desktop/renderer
        run: npm run build

      - name: Build main (tsc)
        working-directory: desktop
        run: npm run build:main

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            desktop/renderer/package-lock.json

      # E2E launches the real Electron binary, so (unlike the unit job) we do NOT
      # skip its download.
      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Install renderer deps
        working-directory: desktop/renderer
        run: npm ci

      # Pull in the system libraries Electron/Chromium need to start under Xvfb.
      - name: Install Electron system libraries
        working-directory: desktop
        run: npx playwright install-deps chromium

      - name: Build renderer (Angular)
        working-directory: desktop/renderer
        run: npm run build

      - name: Build main (tsc)
        working-directory: desktop
        run: npm run build:main

      - name: E2E (Playwright + Electron under Xvfb)
        working-directory: desktop
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: desktop/playwright-report
          retention-days: 7
